.auth-input{width:100%;background:rgba(0,0,0,.3);border:1px solid rgba(212,168,67,.2);border-radius:8px;padding:12px 14px;color:var(--crema);font-family:'Lato',sans-serif;font-size:14px;font-weight:300;margin-bottom:11px;outline:none;transition:border-color .3s;}

.admin-card{background:var(--cafe-oscuro);border:1px solid rgba(212,168,67,.2);border-radius:12px;padding:16px;margin-bottom:12px;}

.btn-link{background:none;border:none;color:var(--suave);font-size:11px;letter-spacing:1px;cursor:pointer;font-family:'Lato',sans-serif;}
</style>
</head>

let usuario = null;
let perfil  = null;
let misionIdx = null;

function hoy() { return new Date().toISOString().split("T")[0]; }

function getNivel(xp) {
  const i = NIVELES.findIndex(function(n){ return xp >= n.min && xp < n.max; });
  return { data: i >= 0 ? NIVELES[i] : NIVELES[NIVELES.length-1], num: (i >= 0 ? i : NIVELES.length-1) + 1 };
}

function getMisionesSet(xp) {
  if (xp >= 450) return M.n3;
  if (xp >= 200) return M.n2;
  return M.n1;
}

function getNivelNumMisiones(xp) {
  if (xp >= 450) return 3;
  if (xp >= 200) return 2;
  return 1;
}

function generarMisiones(xp) {
  const set = getMisionesSet(xp || 0);
  const nv  = getNivelNumMisiones(xp || 0);
  const keys = Object.keys(set);
  const lista = keys.map(function(p) {
    return { p: p, i: Math.floor(Math.random() * set[p].length), nv: nv };
  });
  // mezclar
  for (var j = lista.length - 1; j > 0; j--) {
    var k = Math.floor(Math.random() * (j + 1));
    var tmp = lista[j]; lista[j] = lista[k]; lista[k] = tmp;
  }
  return lista.slice(0, 3);
}

function getDatos(m) {
  var set = m.nv === 3 ? M.n3 : m.nv === 2 ? M.n2 : M.n1;
  return set[m.p][m.i];
}

function estadoInicial() {
  return { xp:0, misiones:0, racha:0, ultimoDia:null, pilares:{identidad:0,comunicacion:0,visibilidad:0,precio:0}, logros:[], misionesHoy:[], misionesHoyEstado:[], evidencias:{} };
}

async function cargarPerfil(uid) {
  const ref  = doc(db, "clientas", uid);
  const snap = await getDoc(ref);
  if (snap.exists()) {
    perfil = snap.data();
    if (!perfil.evidencias) perfil.evidencias = {};
    var cambio = false;
    if (!perfil.misionesHoy || !perfil.misionesHoy.length) {
      perfil.misionesHoy      = generarMisiones(perfil.xp);
      perfil.misionesHoyEstado = [false, false, false];
      cambio = true;
    } else if (perfil.ultimoDia !== hoy()) {
      perfil.misionesHoy      = generarMisiones(perfil.xp);
      perfil.misionesHoyEstado = [false, false, false];
      cambio = true;
    }
    if (cambio) await updateDoc(ref, { misionesHoy: perfil.misionesHoy, misionesHoyEstado: perfil.misionesHoyEstado });
  } else {
    perfil = estadoInicial();
    perfil.nombre = usuario.displayName || usuario.email.split("@")[0];
    perfil.email  = usuario.email;
    perfil.misionesHoy      = generarMisiones(0);
    perfil.misionesHoyEstado = [false, false, false];
    await setDoc(ref, Object.assign({}, perfil, { ultimaActividad: serverTimestamp() }));
  }
}

async function guardar() {
  if (!usuario) return;
  await updateDoc(doc(db, "clientas", usuario.uid), Object.assign({}, perfil, { ultimaActividad: serverTimestamp() }));
}

function registrar() {
  var nombre = document.getElementById("rNombre").value.trim();
  var email  = document.getElementById("rEmail").value.trim();
  var pass   = document.getElementById("rPass").value;
  setError("");
  if (!nombre || !email || !pass) { setError("Completa todos los campos."); return; }
  mostrarCarga(true);
  createUserWithEmailAndPassword(auth, email, pass)
    .then(function(cred) { return updateProfile(cred.user, { displayName: nombre }); })
    .catch(function(e) { setError(errMsg(e.code)); mostrarCarga(false); });
}

function entrar() {
  var email = document.getElementById("lEmail").value.trim();
  var pass  = document.getElementById("lPass").value;
  setError("");
  mostrarCarga(true);
  signInWithEmailAndPassword(auth, email, pass)
    .catch(function(e) { setError(errMsg(e.code)); mostrarCarga(false); });
}

function cerrarSesion() { signOut(auth); }

function errMsg(code) {
  var m = { "auth/email-already-in-use":"Ese email ya est\u00E1 registrado.", "auth/invalid-email":"Email inv\u00E1lido.", "auth/weak-password":"M\u00EDnimo 6 caracteres.", "auth/user-not-found":"No encontramos ese email.", "auth/wrong-password":"Contrase\u00F1a incorrecta.", "auth/invalid-credential":"Email o contrase\u00F1a incorrectos." };
  return m[code] || "Algo sali\u00F3 mal. Intenta de nuevo.";
}

function setError(msg) {
  var el = document.getElementById("errorMsg");
  if (el) el.textContent = msg;
}

// JUEGO
// ------------------------------------------
function notif(msg) {
  var el = document.getElementById("notif");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(function() { el.classList.remove("show"); }, 2800);
}

function mostrarCarga(v) {
  var el = document.getElementById("pantalla-carga");
  if (el) el.style.display = v ? "flex" : "none";
}

function abrirModal(idx) {
  misionIdx = idx;
  var m = perfil.misionesHoy[idx];
  var d = getDatos(m);
  var pObj = PILARES.find(function(p){ return p.id === m.p; });
  var labels = ["Nivel 1 . Activaci\u00F3n","Nivel 2 . Consolidaci\u00F3n","Nivel 3 . Liderazgo Visible"];
  document.getElementById("mPilar").textContent  = pObj.icono + " " + pObj.nombre + " . " + labels[m.nv - 1];
  document.getElementById("mTitulo").textContent = d.t;
  document.getElementById("mDesc").textContent   = d.d;
  document.getElementById("mNota").textContent   = d.n;
  var evBox = document.getElementById("mEvBox");
  if (d.ev) {
    evBox.style.display = "block";
    document.getElementById("mEvLabel").textContent = d.ev;
    document.getElementById("mEvInput").value = "";
    document.getElementById("mEvHint").textContent  = "";
  } else {
    evBox.style.display = "none";
  }
  document.getElementById("modal").classList.add("open");
}

function cerrarModal() {
  document.getElementById("modal").classList.remove("open");
  misionIdx = null;
}

function completar() {
  if (misionIdx === null) return;
  if (perfil.misionesHoyEstado[misionIdx]) return;
  var m = perfil.misionesHoy[misionIdx];
  var d = getDatos(m);
  if (d.ev) {
    var val = document.getElementById("mEvInput").value.trim();
    if (!val) { document.getElementById("mEvHint").textContent = "Agrega tu evidencia para completar esta misi\u00F3n."; return; }
    var key = "ev_" + misionIdx + "_" + hoy();
    perfil.evidencias[key] = { texto: val, pilar: m.p, mision: d.t, fecha: new Date().toISOString() };
  }
  perfil.misionesHoyEstado[misionIdx] = true;
  perfil.xp += d.xp;
  perfil.misiones += 1;
  perfil.pilares[m.p] = Math.min(100, (perfil.pilares[m.p] || 0) + 20);
  if (perfil.ultimoDia !== hoy()) { perfil.racha += 1; perfil.ultimoDia = hoy(); }
  chequearLogros();
  guardar();
  cerrarModal();
  renderClienta();
  notif("+" + d.xp + " XP . Misi\u00F3n completada");
}

function nuevasMisiones() {
  perfil.misionesHoy      = generarMisiones(perfil.xp);
  perfil.misionesHoyEstado = [false, false, false];
  guardar();
  renderMisiones();
  notif("Nuevas misiones asignadas");
}

function chequearLogros() {
  var nv = getNivel(perfil.xp).num;
  LOGROS.forEach(function(l) {
    if (perfil.logros.indexOf(l.id) >= 0) return;
    var ok = false;
    if (l.tipo === "misiones" && perfil.misiones >= l.req) ok = true;
    if (l.tipo === "racha"    && perfil.racha    >= l.req) ok = true;
    if (l.tipo === "nivel"    && nv              >= l.req) ok = true;
    if (ok) { perfil.logros.push(l.id); setTimeout(function(){ notif("Logro: " + l.nombre); }, 700); }
  });
}

function cambiarTab(id, btn) {
  document.querySelectorAll(".tab").forEach(function(t){ t.classList.remove("activo"); });
  document.querySelectorAll(".nav-tab").forEach(function(b){ b.classList.remove("activo"); });
  document.getElementById("t-" + id).classList.add("activo");
  btn.classList.add("activo");
}

// RENDER
// ------------------------------------------
function renderMisiones() {
  var cont = document.getElementById("lista-misiones");
  if (!cont) return;
  var html = "";
  perfil.misionesHoy.forEach(function(m, i) {
    var d    = getDatos(m);
    var pObj = PILARES.find(function(p){ return p.id === m.p; });
    var done = perfil.misionesHoyEstado[i];
    var labels = ["N1","N2","N3"];
    html += '<div class="mision-card' + (done ? " done" : "") + '" ' + (done ? "" : 'onclick="abrirModal(' + i + ')"') + '>';
    html += '<div class="check">' + (done ? "\u2713" : "") + "</div>";
    html += '<div style="flex:1">';
    html += '<div class="mision-pilar">' + pObj.icono + " " + pObj.nombre + "</div>";
    html += '<div class="mision-nivel">' + labels[m.nv - 1] + (d.ev ? " . Con evidencia" : "") + "</div>";
    html += '<div class="mision-txt">' + d.t + "</div>";
    html += '<span class="xp-tag">+' + d.xp + " XP</span>";
    html += "</div></div>";
  });
  cont.innerHTML = html;
}

function renderPilares() {
  var cont = document.getElementById("pilares-cont");
  if (!cont) return;
  var html = "";
  PILARES.forEach(function(p) {
    var pct = perfil.pilares[p.id] || 0;
    html += '<div class="pilar-card">';
    html += '<div class="pilar-ico">' + p.icono + "</div>";
    html += '<div class="pilar-nombre">' + p.nombre + "</div>";
    html += '<div class="pilar-pct">' + pct + "% desarrollado</div>";
    html += '<div class="p-bar"><div class="p-fill" style="width:' + pct + '%"></div></div>';
    html += "</div>";
  });
  cont.innerHTML = html;
}

function renderLogros() {
  var cont = document.getElementById("logros-cont");
  if (!cont) return;
  var html = "";
  LOGROS.forEach(function(l) {
    var ok = perfil.logros.indexOf(l.id) >= 0;
    html += '<div class="logro' + (ok ? " ok" : "") + '">';
    html += '<div class="logro-ico" style="' + (ok ? "" : "filter:grayscale(1);opacity:.3") + '">' + l.ico + "</div>";
    html += '<div class="logro-nombre">' + l.nombre + "</div>";
    html += "</div>";
  });
  cont.innerHTML = html;
  document.getElementById("stat-logros").textContent = perfil.logros.length;
}

function renderStats() {
  var nv   = getNivel(perfil.xp);
  var nd   = nv.data;
  var num  = nv.num;
  var pct  = Math.round(((perfil.xp - nd.min) / (nd.max - nd.min)) * 100);
  document.getElementById("nivel-nombre").textContent = nd.nombre;
  document.getElementById("nivel-badge").textContent  = "Nivel " + num;
  document.getElementById("xp-actual").textContent    = perfil.xp;
  document.getElementById("xp-meta").textContent      = nd.max;
  document.getElementById("xp-pct").textContent       = pct + "%";
  document.getElementById("xp-barra").style.width     = pct + "%";
  document.getElementById("stat-racha").textContent   = perfil.racha;
  document.getElementById("stat-misiones").textContent = perfil.misiones;
}

function renderFrase() {
  var el = document.getElementById("frase-txt");
  if (el) el.textContent = FRASES[Math.floor(Date.now() / 86400000) % FRASES.length];
}

function renderClienta() {
  renderStats();
  renderMisiones();
  renderPilares();
  renderLogros();
  renderFrase();
}

  var cont = document.getElementById("admin-lista");

  if (!clientas.length) { cont.innerHTML = '<p style="color:var(--suave);text-align:center;padding:30px 0;font-style:italic;">A\u00FAn no hay clientas registradas.</p>'; return; }
  var html = "";
  clientas.forEach(function(c) {
    var nv  = getNivel(c.xp || 0);
    var nd  = nv.data;
    var pct = Math.round((((c.xp || 0) - nd.min) / (nd.max - nd.min)) * 100);
    html += '<div class="admin-card">';
    html += '<div class="row-sb" style="margin-bottom:10px"><div><div class="admin-nombre">' + (c.nombre || c.email) + '</div><div class="admin-email">' + c.email + '</div></div><div class="badge">Nivel ' + nv.num + '</div></div>';
    html += '<div class="admin-stats">';
    html += '<div class="admin-stat"><span class="admin-sn">' + (c.xp || 0) + '</span><span class="admin-sl">XP</span></div>';
    html += '<div class="admin-stat"><span class="admin-sn">' + (c.misiones || 0) + '</span><span class="admin-sl">Misiones</span></div>';
    html += '<div class="admin-stat"><span class="admin-sn">' + (c.racha || 0) + '</span><span class="admin-sl">Racha</span></div>';
    html += '<div class="admin-stat"><span class="admin-sn">' + ((c.logros || []).length) + '</span><span class="admin-sl">Logros</span></div>';
    html += '</div>';
    html += '<div class="label-xs" style="margin-bottom:4px">' + nd.nombre + ' . ' + pct + '%</div>';
    html += '<div class="xp-bar-bg"><div class="xp-bar" style="width:' + pct + '%"></div></div>';
    PILARES.forEach(function(p) {
      var v = c.pilares ? (c.pilares[p.id] || 0) : 0;
      html += '<div class="admin-pilar-row"><span>' + p.icono + '</span><div class="p-bar" style="flex:1"><div class="p-fill" style="width:' + v + '%"></div></div><span style="font-size:10px;color:var(--suave);width:30px;text-align:right">' + v + '%</span></div>';
    });
    if (c.evidencias && Object.keys(c.evidencias).length) {
      html += '<div style="margin-top:12px;border-top:1px solid rgba(212,168,67,.12);padding-top:10px"><div class="label-xs" style="margin-bottom:7px">Evidencias recientes</div>';
      var evs = Object.values(c.evidencias).slice(-3);
      evs.forEach(function(e) {
        html += '<div class="ev-item"><div class="ev-meta">' + (e.pilar ? e.pilar.toUpperCase() : "") + " . " + (e.fecha ? new Date(e.fecha).toLocaleDateString("es") : "") + '</div><div class="ev-texto">' + e.texto + '</div></div>';
      });
      html += '</div>';
    }
    html += '</div>';
  });
  cont.innerHTML = html;
}
